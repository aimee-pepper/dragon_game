<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dragon Keeper — Combat Simulator</title>
  <script src="js/tool-nav.js" defer></script>
  <link rel="stylesheet" href="css/tools.css">
</head>
<body>
  <header>
    <h1>Combat Simulator</h1>
    <nav id="tools-nav">
      <button class="tool-tab" id="theme-toggle">☀ Light</button>
    </nav>
  </header>
  <main id="combat-app"></main>
  <script type="module">
    import { initCombatSim } from './js/tool-combat-sim.js';

    // Theme toggle
    const btn = document.getElementById('theme-toggle');
    if (btn) {
      btn.addEventListener('click', () => {
        const isLight = document.body.classList.toggle('light-mode');
        btn.textContent = isLight ? '☾ Dark' : '☀ Light';
      });
    }

    // Init combat simulator
    initCombatSim(document.getElementById('combat-app'));
  </script>
</body>
</html>
